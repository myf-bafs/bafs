<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式手势控制3D粒子爱心</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
        }
        #webgl-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ff4d6d;
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.5);
            transform: scaleX(-1); /* 镜像翻转摄像头画面 */
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #tips {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            pointer-events: none;
            text-shadow: 0 0 5px #000;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>

    <div id="loading">正在加载模型和开启摄像头，请稍候并允许摄像头权限...</div>
    <div id="tips">张开手掌：散开粒子<br>握拳/收拢：聚集爱心</div>
    
    <canvas id="webgl-canvas"></canvas>
    <div id="video-container">
        <video id="input-video" autoplay playsinline></video>
    </div>

    <script>
        // ==========================================
        // 1. Three.js 3D 场景与粒子系统设置
        // ==========================================
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const particleCount = 8000; // 粒子数量
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const heartTargets = new Float32Array(particleCount * 3);
        const randomTargets = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorBase = new THREE.Color('#ff4d6d');
        const colorVariation = new THREE.Color('#ffb3c1');

        for (let i = 0; i < particleCount; i++) {
            // 生成爱心形状的目标位置 (使用爱心数学参数方程)
            const t = Math.random() * Math.PI * 2;
            const r = Math.random(); // 用于生成实心/有厚度的感觉
            
            const hx = 16 * Math.pow(Math.sin(t), 3) * (0.5 + 0.5 * r);
            const hy = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * (0.5 + 0.5 * r);
            const hz = (Math.random() - 0.5) * 8; // Z轴厚度

            heartTargets[i * 3] = hx;
            heartTargets[i * 3 + 1] = hy;
            heartTargets[i * 3 + 2] = hz;

            // 生成随机散开的目标位置
            const rx = (Math.random() - 0.5) * 150;
            const ry = (Math.random() - 0.5) * 150;
            const rz = (Math.random() - 0.5) * 150;

            randomTargets[i * 3] = rx;
            randomTargets[i * 3 + 1] = ry;
            randomTargets[i * 3 + 2] = rz;

            // 初始位置设为随机位置
            positions[i * 3] = rx;
            positions[i * 3 + 1] = ry;
            positions[i * 3 + 2] = rz;

            // 粒子颜色
            const mixedColor = colorBase.clone().lerp(colorVariation, Math.random());
            colors[i * 3] = mixedColor.r;
            colors[i * 3 + 1] = mixedColor.g;
            colors[i * 3 + 2] = mixedColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // 自定义着色器材质让粒子变成圆形发光点
        const material = new THREE.PointsMaterial({
            size: 0.8,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // 窗口大小适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 2. MediaPipe 手势识别逻辑
        // ==========================================
        const videoElement = document.getElementById('input-video');
        let targetState = 1; // 0 = 爱心 (聚攏), 1 = 散开 (张开)
        let currentState = 1; // 当前平滑过渡状态

        // 判断手掌是否张开的函数
        function isHandOpen(landmarks) {
            const wrist = landmarks[0];
            let openFingers = 0;
            // 指尖索引：食指(8), 中指(12), 无名指(16), 小指(20)
            const tips = [8, 12, 16, 20];
            // 掌指关节索引：(5, 9, 13, 17)
            const mcps = [5, 9, 13, 17];
            
            for (let i = 0; i < 4; i++) {
                const tipDist = Math.hypot(landmarks[tips[i]].x - wrist.x, landmarks[tips[i]].y - wrist.y);
                const mcpDist = Math.hypot(landmarks[mcps[i]].x - wrist.x, landmarks[mcps[i]].y - wrist.y);
                // 如果指尖到手腕的距离大于掌关节到手腕的距离，说明该手指是伸直的
                if (tipDist > mcpDist) {
                    openFingers++;
                }
            }
            // 如果有3个或以上的手指伸直，判定为手掌张开
            return openFingers >= 3;
        }

        function onResults(results) {
            document.getElementById('loading').style.opacity = '0';
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const isOpen = isHandOpen(landmarks);
                
                // 张开手 = 散开 (1)； 握拳/收拢 = 爱心 (0)
                targetState = isOpen ? 1 : 0;
            }
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        hands.onResults(onResults);

        const cameraMediaPipe = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        cameraMediaPipe.start();

        // ==========================================
        // 3. 动画与渲染循环
        // ==========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 平滑过渡状态 (Lerp)
            currentState += (targetState - currentState) * delta * 5;

            const positionsAttribute = geometry.attributes.position;
            const posArray = positionsAttribute.array;

            // 让整个粒子系统缓慢自转
            particleSystem.rotation.y += delta * 0.5;

            // 更新每个粒子的位置
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                // 目标位置：根据当前状态在“爱心”和“随机散开”之间插值
                const targetX = THREE.MathUtils.lerp(heartTargets[i3], randomTargets[i3], currentState);
                const targetY = THREE.MathUtils.lerp(heartTargets[i3 + 1], randomTargets[i3 + 1], currentState);
                const targetZ = THREE.MathUtils.lerp(heartTargets[i3 + 2], randomTargets[i3 + 2], currentState);

                // 让当前粒子位置平滑移动到目标位置
                posArray[i3] += (targetX - posArray[i3]) * 0.1;
                posArray[i3 + 1] += (targetY - posArray[i3 + 1]) * 0.1;
                posArray[i3 + 2] += (targetZ - posArray[i3 + 2]) * 0.1;
            }

            positionsAttribute.needsUpdate = true;
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
