```html
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAFS 會計等式卡牌戰</title>
    <style>
        :root {
            --asset-color: #2980b9;
            --capital-color: #27ae60;
            --liability-color: #e67e22;
            --bg-dark: #2c3e50;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f6f7;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--bg-dark);
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        .equation-dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-dark);
            color: white;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .eq-box {
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
            min-width: 150px;
        }
        .bg-asset { background: var(--asset-color); }
        .bg-capital { background: var(--capital-color); }
        .bg-liability { background: var(--liability-color); }

        .card-zone {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .event-card {
            width: 100%;
            max-width: 500px;
            background: #fffdf0;
            border: 3px solid #f1c40f;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.2);
            text-align: center;
        }

        .card-title {
            font-size: 1.3rem;
            color: #d35400;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px dashed #f1c40f;
            padding-bottom: 10px;
        }

        .card-text {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #34495e;
            min-height: 80px;
        }

        .opt-btn.disabled { opacity: 0.4; cursor: not-allowed; }

        .answer-zone {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .choice-section {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background: #fafafa;
        }
        .choice-section.asset-border { border-top: 6px solid var(--asset-color); }
        .choice-section.capital-border { border-top: 6px solid var(--capital-color); }
        .choice-section.liability-border { border-top: 6px solid var(--liability-color); }

        .choice-section h3 {
            margin-top: 0;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .opt-btn {
            padding: 10px;
            border: 2px solid #ccc;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.2s;
        }

        .opt-btn.selected-plus { background: #2ecc71; color: white; border-color: #27ae60; }
        .opt-btn.selected-minus { background: #e74c3c; color: white; border-color: #c0392b; }
        .opt-btn.selected-none { background: #95a5a6; color: white; border-color: #7f8c8d; }

        .control-btns {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .main-btn {
            flex: 1;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-check { background: #2c3e50; }
        .btn-next { background: #8e44ad; }

        .feedback {
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            margin: 15px 0;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
        .success-box { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error-box { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .game-container { padding: 15px; }
            h1 { font-size: 1.3rem; }
            .subtitle { font-size: 0.85rem; }
            .equation-dashboard {
                flex-wrap: wrap;
                gap: 6px;
                padding: 12px;
                font-size: 1rem;
            }
            .eq-box {
                min-width: 0;
                padding: 6px 10px;
                font-size: 0.85rem;
                flex: 1;
            }
            .answer-zone {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .choice-section { padding: 10px; }
            .choice-section h3 { font-size: 1rem; }
            .opt-btn { padding: 12px 8px; font-size: 0.9rem; }
            .event-card { padding: 15px; }
            .card-title { font-size: 1.1rem; }
            .card-text { font-size: 1rem; }
            .control-btns { flex-direction: column; gap: 10px; }
            .main-btn { padding: 12px; font-size: 1rem; }
            .feedback { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🃏 BAFS 會計等式卡牌流動戰</h1>
    <div class="subtitle">學習目標：掌握日常交易如何影響 資產 = 資本 + 收益 − 費用 + 負債</div>

    <div class="equation-dashboard">
        <div class="eq-box bg-asset">資產 (Assets)</div>
        <div>＝</div>
        <div class="eq-box bg-capital">資本＋收益−費用</div>
        <div>＋</div>
        <div class="eq-box bg-liability">負債 (Liabilities)</div>
    </div>

    <div class="card-zone">
        <div class="event-card">
            <div class="card-title" id="cardNo">情景卡片 1 / 8</div>
            <div class="card-text" id="cardText">正在載入日常情景...</div>

        </div>
    </div>

    <div class="answer-zone">
        <div class="choice-section asset-border">
            <h3 style="color:var(--asset-color)">資產 變動</h3>
            <div class="btn-group">
                <button class="opt-btn" id="a-plus" onclick="selectOpt('A', 'plus')">➕ 增加 ( + )</button>
                <button class="opt-btn" id="a-minus" onclick="selectOpt('A', 'minus')">➖ 減少 ( - )</button>
                <button class="opt-btn" id="a-none" onclick="selectOpt('A', 'none')">⚪ 無變動 ( 0 )</button>
            </div>
        </div>

        <div class="choice-section capital-border">
            <h3 style="color:var(--capital-color)">資本 變動</h3>
            <div class="btn-group">
                <button class="opt-btn" id="c-plus" onclick="selectOpt('C', 'plus')">➕ 增加 ( + )</button>
                <button class="opt-btn" id="c-minus" onclick="selectOpt('C', 'minus')">➖ 減少 ( - )</button>
                <button class="opt-btn" id="c-none" onclick="selectOpt('C', 'none')">⚪ 無變動 ( 0 )</button>
            </div>
        </div>

        <div class="choice-section liability-border">
            <h3 style="color:var(--liability-color)">負債 變動</h3>
            <div class="btn-group">
                <button class="opt-btn" id="l-plus" onclick="selectOpt('L', 'plus')">➕ 增加 ( + )</button>
                <button class="opt-btn" id="l-minus" onclick="selectOpt('L', 'minus')">➖ 減少 ( - )</button>
                <button class="opt-btn" id="l-none" onclick="selectOpt('L', 'none')">⚪ 無變動 ( 0 )</button>
            </div>
        </div>
    </div>

    <div id="feedbackBox" class="feedback"></div>

    <div class="control-btns">
        <button class="main-btn btn-check" onclick="checkAnswer()">🔍 提交核數</button>
        <button class="main-btn btn-next" onclick="nextCard()">🃏 下一張情景卡</button>
    </div>
</div>

<script>
    const cards = [
        { title: "【午餐花費】", text: "你用八達通在學校飯堂花了 $35 購買午餐食用。", A: "minus", C: "minus", L: "none", exp: "八達通（資產）減少；購買午餐屬於日常開支，會使利潤減少，因此資本也跟著減少。" },
        { title: "【收到利是】", text: "過年時你收到父母給予的 $500 利是錢，並放入錢包。", A: "plus", C: "plus", L: "none", exp: "現金（資產）增加；利是錢視為資本注入，資本也隨之增加。" },
        { title: "【湊錢叫外賣】", text: "你和朋友一起叫外賣，但現金不足，先向朋友借了 $30 支付。", A: "plus", C: "none", L: "plus", exp: "獲得外賣食物（資產+）；但欠下朋友債務，負債也增加。" },
        { title: "【還錢給朋友】", text: "第二天你用現金 $30 還給昨天借錢給你的朋友。", A: "minus", C: "none", L: "minus", exp: "現金減少（資產-）；還清欠款，負債也隨之減少。" },
        { title: "【課金消費】", text: "你從自己經營的小生意銀行戶口中，提取了 $200 去購買手機遊戲造型。", A: "minus", C: "minus", L: "none", exp: "銀行存款減少（資產-）；東主提取公司資金自用（提用），資本減少。" },
        { title: "【八達通增值】", text: "你用現金 $100 到便利店為自己的八達通卡增值。", A: "none", C: "none", L: "none", exp: "特別注意！八達通增加（資產+）但現金減少（資產-），屬於資產內部轉換，總資產不變，資本和負債均不受影響。" },
        { title: "【補習收入】", text: "你上個月幫助學弟補習數學，今天收到他支付的 $200 補習費現金。", A: "plus", C: "plus", L: "none", exp: "現金增加（資產+）；賺取的收入增加公司利潤，資本也隨之增加。" },
        { title: "【網購衣服】", text: "你在網店購買了一件 $150 的衣服，選擇了「貨到付款」尚未付款。", A: "plus", C: "none", L: "plus", exp: "收到衣服（資產+）；但尚未付款，欠網店的債務（負債）增加。" }
    ];

    let currentIdx = 0;
    let currentSelection = { A: null, C: null, L: null };

    function loadCard() {
        if(currentIdx >= cards.length) {
            alert("🎉 太棒了！全盤賬目審計完成！你已掌握了基本會計等式！");
            currentIdx = 0;
        }
        
        const card = cards[currentIdx];
        document.getElementById("cardNo").innerText = `情景卡片 ${currentIdx + 1} / ${cards.length} ${card.title}`;
        document.getElementById("cardText").innerText = card.text;
        
        currentSelection = { A: null, C: null, L: null };
        document.querySelectorAll('.opt-btn').forEach(btn => {
            btn.className = "opt-btn";
        });
        document.getElementById("feedbackBox").style.display = "none";
        document.querySelectorAll('.opt-btn').forEach(btn => btn.classList.remove('disabled'));
    }

    function selectOpt(type, val) {
        currentSelection[type] = val;
        
        const prefix = type.toLowerCase();
        document.getElementById(`${prefix}-plus`).className = "opt-btn";
        document.getElementById(`${prefix}-minus`).className = "opt-btn";
        document.getElementById(`${prefix}-none`).className = "opt-btn";
        
        const targetBtn = document.getElementById(`${prefix}-${val}`);
        if(val === 'plus') targetBtn.classList.add('selected-plus');
        if(val === 'minus') targetBtn.classList.add('selected-minus');
        if(val === 'none') targetBtn.classList.add('selected-none');
    }

    function checkAnswer() {
        if(!currentSelection.A || !currentSelection.C || !currentSelection.L) {
            alert("⚠️ 請先完成 資產、資本 和 負債 三個範疇的變動預測！");
            return;
        }

        document.querySelectorAll('.opt-btn').forEach(btn => btn.classList.add('disabled'));

        const answer = cards[currentIdx];
        const fBox = document.getElementById("feedbackBox");
        
        const isCorrect = (currentSelection.A === answer.A && 
                           currentSelection.C === answer.C && 
                           currentSelection.L === answer.L);

        fBox.style.display = "block";
        if(isCorrect) {
            fBox.className = "feedback success-box";
            fBox.innerHTML = `✅ 審計平衡！答案完全正確！<br><small style="font-size:0.95rem; font-weight:normal;">💡 原因：${answer.exp}</small>`;
        } else {
            fBox.className = "feedback error-box";
            const translate = (v) => v === 'plus' ? '增加(+' : (v === 'minus' ? '減少(-)' : '無變動(0)');
            fBox.innerHTML = `❌ 等式不平衡或預測錯誤！<br>
                              <small style="font-size:1rem; font-weight:normal;">
                                正確賬目流動應為：<br>
                                <strong>資產:</strong> ${translate(answer.A)} | 
                                <strong>資本:</strong> ${translate(answer.C)} | 
                                <strong>負債:</strong> ${translate(answer.L)}
                                <br><br>👉 <strong>會計點撥：</strong>${answer.exp}
                              </small>`;
        }
    }

    function nextCard() {
        currentIdx++;
        loadCard();
    }

    window.onload = loadCard;
</script>

</body>
</html>
```
